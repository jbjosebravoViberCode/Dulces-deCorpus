<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="Logo Dulces de Corpus Carmita Garate">
  <!-- Badge redondo suave -->
  <circle cx="60" cy="60" r="58" fill="#ffffff"/>
  <circle cx="60" cy="60" r="58" fill="none" stroke="#A7C7E7" stroke-width="3"/>

  <!-- Base del cupcake (envoltorio azul) -->
  <path d="M40 66 L80 66 L74 96 Q60 100 46 96 Z" fill="#A7C7E7"/>
  <g stroke="#7FA8D4" stroke-width="2" opacity="0.7">
    <line x1="49" y1="68" x2="46" y2="95"/>
    <line x1="60" y1="68" x2="60" y2="97"/>
    <line x1="71" y1="68" x2="74" y2="95"/>
  </g>

  <!-- Crema (frosting rosado) -->
  <path d="M38 66 Q34 50 46 48 Q44 36 60 36 Q76 36 74 48 Q86 50 82 66 Z" fill="#F7B7CD"/>
  <path d="M44 58 Q42 50 50 50 Q49 43 60 43 Q71 43 70 50 Q78 50 76 58 Z" fill="#F9CBDB"/>

  <!-- Cereza -->
  <circle cx="60" cy="34" r="5" fill="#E8607A"/>
  <path d="M60 29 q4 -7 9 -8" stroke="#7BA05B" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Grageas -->
  <g fill="#ffffff" opacity="0.9">
    <circle cx="52" cy="55" r="1.6"/><circle cx="67" cy="53" r="1.6"/>
    <circle cx="60" cy="60" r="1.6"/><circle cx="55" cy="62" r="1.6"/>
  </g>
</svg>
